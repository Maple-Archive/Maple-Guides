<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maple Guides</title>

<style>
html {
    background: #111;
}

body {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
    font-family: system-ui, sans-serif;
    line-height: 1.5;

    background: transparent;
    color: #222;
}

h1 {
    margin-bottom: 8px;
}

.subtitle {
    color: #666;
    margin-bottom: 32px;
}

.section {
    margin-bottom: 32px;
}

.guide {
    display: block;
    padding: 14px 18px;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-bottom: 12px;
    transition: background .15s ease, border-color .15s ease;
}

.guide:hover {
    background: #f5f5f5;
}

.guide-title {
    font-weight: 600;
}

.guide-source {
    margin-top: 4px;
    font-size: 0.9rem;
}

.guide a {
    color: inherit;
    text-decoration: none;
}

@media (prefers-color-scheme: dark) {
    body {
        color: #eee;
    }

    .subtitle {
        color: #aaa;
    }

    .guide {
        border-color: #333;
    }

    .guide:hover {
        background: rgba(255,255,255,0.04);
        border-color: #555;
    }

    .guide-source {
        color: #aaa;
    }
}
</style>
</head>

<body>

<h1>Maple Guides</h1>
<p class="subtitle"></p>

<div class="section">
    <h2>Boss Guides</h2>

<div class="guide">
    <a class="guide-main" href="Boss-Guides/Malefic-Star.html">
        <div class="guide-title">Malefic Star</div>
    </a>

    <div class="guide-source">
        <a href="https://docs.google.com/document/d/1qGre_k2_m68imDiKPzoyEQaVv7XO0RTea0mGct-TXH4"
           target="_blank" onclick="return confirmSource(event)">
            Source: https://docs.google.com/document/d/1qGre_k2_m68imDiKPzoyEQaVv7XO0RTea0mGct-TXH4
        </a>
    </div>
</div>

</div>


<div class="section">
    <h2>Class Guides</h2>

<div class="guide">
    <a class="guide-main" href="Class-Guides/Erel-Light.html">
        <div class="guide-title">Erel Light</div>
    </a>

    <div class="guide-source">
        <a href="https://docs.google.com/document/d/1TQgJF3cbjlfZGK05GoEtA3oHLQxsMyyPcLAlpHcj4Jc"
           target="_blank" onclick="return confirmSource(event)">
            Source: https://docs.google.com/document/d/1TQgJF3cbjlfZGK05GoEtA3oHLQxsMyyPcLAlpHcj4Jc
        </a>
    </div>
</div>

</div>

<script>
function confirmSource(event) {
    const proceed = confirm(
        "Proceed to Google Doc?"
    );

    if (!proceed) {
        event.preventDefault();
        return false;
    }

    return true;
}
</script>

</body>
</html>
